<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Wash Laundry - Sistem POS Laundry Modern">
    <title>Login — Smart Wash Laundry</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}" type="image/png">
</head>
<body>
    <div class="login-page">
        <!-- Decorative blobs -->
        <div class="login-blob login-blob-1"></div>
        <div class="login-blob login-blob-2"></div>
        <div class="login-blob login-blob-3"></div>

        <div class="login-container">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Smart Wash Laundry" class="login-logo">

            <form class="login-form" method="POST" action="{{ url_for('auth.login') }}">
                <div class="login-input-group">
                    <span class="input-icon"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" placeholder="username" required autocomplete="username" id="loginUsername">
                </div>
                <div class="login-input-group">
                    <span class="input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" placeholder="password" required autocomplete="current-password" id="loginPassword">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">LOGIN</button>
            </form>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="login-error">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>
    </div>
</body>
</html>
