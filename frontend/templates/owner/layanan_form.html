{% extends 'base.html' %}
{% set active_menu = 'layanan' %}

{% block content %}
<div class="mb-3">
    <a href="{{ url_for('owner_layanan.layanan_list') }}" style="color:var(--text-gray); font-size:13px; font-weight:500;">
        ← Kembali ke Daftar Layanan
    </a>
</div>

<div class="card" style="max-width: 600px; margin:0 auto;">
    <div class="card-header">
        <h3>{{ 'Edit Layanan' if mode == 'edit' else 'Tambah Layanan Baru' }}</h3>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label for="nama_layanan">Nama Layanan *</label>
                <input type="text" class="form-control" id="nama_layanan" name="nama_layanan" required 
                       value="{{ layanan.nama_layanan if layanan else '' }}" placeholder="Contoh: Cuci Komplit">
            </div>

            <div class="form-group">
                <label for="kategoriLayanan">Kategori *</label>
                <select class="form-control" id="kategoriLayanan" name="kategori">
                    <option value="Layanan" {{ 'selected' if layanan and layanan.kategori == 'Layanan' else '' }}>Layanan Utama (Per Kg)</option>
                    <option value="Add-on" {{ 'selected' if layanan and layanan.kategori == 'Add-on' else '' }}>Add-on / Tambahan (Satuan)</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group" id="groupHargaKg">
                    <label for="harga_per_kg">Tarif Per Kg (Rp)</label>
                    <input type="number" class="form-control" id="harga_per_kg" name="harga_per_kg" 
                           value="{{ '{:.0f}'.format(layanan.harga_per_kg) if layanan else '0' }}">
                </div>
                
                <div class="form-group" id="groupHargaSatuan" style="display:none;">
                    <label for="harga_satuan">Tarif Satuan (Rp)</label>
                    <input type="number" class="form-control" id="harga_satuan" name="harga_satuan" 
                           value="{{ '{:.0f}'.format(layanan.harga_satuan) if layanan else '0' }}">
                </div>

                <div class="form-group">
                    <label for="estimasi_hari">Estimasi Waktu (Hari)</label>
                    <input type="number" class="form-control" id="estimasi_hari" name="estimasi_hari" min="1" 
                           value="{{ layanan.estimasi_hari if layanan else '2' }}">
                </div>
            </div>

            <div class="form-group">
                <label for="deskripsi">Deskripsi Singkat</label>
                <textarea class="form-control" id="deskripsi" name="deskripsi" placeholder="Deskripsi layanan...">{{ layanan.deskripsi if layanan else '' }}</textarea>
            </div>

            <div class="form-group">
                <div class="form-check">
                    <input type="checkbox" id="aktif" name="aktif" value="1" 
                           {{ 'checked' if (not layanan) or (layanan and layanan.aktif) else '' }}>
                    <label for="aktif" class="mb-0" style="cursor:pointer;">Layanan Aktif</label>
                </div>
                <small style="color:var(--text-light); margin-left:26px;">Centang untuk menampilkan layanan ini ke kasir.</small>
            </div>

            <hr style="border:0; border-top:1px solid #E5E7EB; margin:24px 0;">

            <div class="d-flex justify-between">
                <a href="{{ url_for('owner_layanan.layanan_list') }}" class="btn" style="background:#F3F4F6; color:var(--text-dark);">Batal</a>
                <button type="submit" class="btn btn-primary">
                    {{ 'Simpan Perubahan' if mode == 'edit' else 'Tambah Layanan' }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
